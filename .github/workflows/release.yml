name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: doubao-seed-skill
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: doubao-seed-skill
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: doubao-seed-skill
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: doubao-seed-skill
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: doubao-seed-skill.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (aarch64 Linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          BIN=target/${{ matrix.target }}/release/${{ matrix.artifact }}
          ARCHIVE=doubao-seed-skill-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
          tar -czf $ARCHIVE -C target/${{ matrix.target }}/release ${{ matrix.artifact }}
          md5sum $ARCHIVE > $ARCHIVE.md5
          sha256sum $ARCHIVE > $ARCHIVE.sha256
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ARCHIVE = "doubao-seed-skill-${{ github.ref_name }}-${{ matrix.target }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/${{ matrix.artifact }}" -DestinationPath $ARCHIVE
          $md5 = (Get-FileHash $ARCHIVE -Algorithm MD5).Hash.ToLower()
          "$md5  $ARCHIVE" | Out-File -Encoding utf8 "$ARCHIVE.md5"
          $sha256 = (Get-FileHash $ARCHIVE -Algorithm SHA256).Hash.ToLower()
          "$sha256  $ARCHIVE" | Out-File -Encoding utf8 "$ARCHIVE.sha256"
          echo "ARCHIVE=$ARCHIVE" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.md5
            ${{ env.ARCHIVE }}.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true
